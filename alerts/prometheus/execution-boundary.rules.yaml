# alerts/prometheus/execution-boundary.rules.yaml
# Execution Boundary business-level alerts.
# Requires eb.decision label on spans exported as metrics.

groups:
  - name: execution-boundary
    rules:
      - alert: DenyRateHigh
        expr: |
          rate(eb_decisions_total{decision="DENY"}[5m])
          / rate(eb_decisions_total[5m]) > 0.30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Execution boundary DENY rate above 30%"
          description: "DENY rate {{ $value | humanizePercentage }}. Review policy or upstream inputs."

      - alert: LedgerCommitFailing
        expr: |
          rate(eb_ledger_commit_total{result="failure"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Execution boundary ledger commit failures"
          description: "Ledger commits failing. Decisions may not be recorded. Check storage."

      - alert: DecisionLatencyHigh
        expr: |
          histogram_quantile(0.99, rate(eb_decision_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Execution boundary decision p99 > 500ms"
          description: "Evaluator latency degraded. Pre-execution gate may become bottleneck."

      - alert: NoDenyInWindow
        expr: |
          sum(rate(eb_decisions_total{decision="DENY"}[30m])) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "No DENY decisions in 30 minutes"
          description: "Either traffic is absent or policy is not being exercised. Verify gate is active."
