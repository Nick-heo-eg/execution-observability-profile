version: "3.8"

# Local debug topology for execution-observability-profile.
# FOR LOCAL DEVELOPMENT ONLY. Not for production use.
#
# Mirrors the 2-tier Agent → Gateway production topology in a single-host setup.
# No Kubernetes required. No auth. No TLS.
#
# Usage:
#   docker-compose up -d
#   python3 ../../send_sample_spans.py   # optional: inject test spans
#   open http://localhost:3000           # Grafana
#   open http://localhost:9090           # Prometheus
#   open http://localhost:4318           # OTLP HTTP receiver (debug)
#
# Stop:
#   docker-compose down -v

services:

  # -----------------------------------------------------------------------
  # Collector: Agent role (equivalent to DaemonSet in k8s)
  # Receives OTLP from application, forwards to gateway via OTLP/gRPC.
  # -----------------------------------------------------------------------
  otelcol-agent:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: otelcol-agent
    command: ["--config=/etc/otelcol/agent-config.yaml"]
    volumes:
      - ./agent-config.yaml:/etc/otelcol/agent-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver (application → agent)
      - "4318:4318"   # OTLP HTTP receiver (application → agent)
      - "8888:8888"   # agent self-metrics → Prometheus scrape
    depends_on:
      - otelcol-gateway
    networks:
      - eb-debug

  # -----------------------------------------------------------------------
  # Collector: Gateway role (equivalent to Deployment HA in k8s)
  # Applies tail sampling. Exports to Jaeger + Prometheus.
  # -----------------------------------------------------------------------
  otelcol-gateway:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: otelcol-gateway
    command: ["--config=/etc/otelcol/gateway-config.yaml"]
    volumes:
      - ./gateway-config.yaml:/etc/otelcol/gateway-config.yaml:ro
    ports:
      - "4319:4317"   # OTLP gRPC receiver (agent → gateway; mapped to 4319 externally)
      - "8889:8888"   # gateway self-metrics → Prometheus scrape
    depends_on:
      - jaeger
      - prometheus
    networks:
      - eb-debug

  # -----------------------------------------------------------------------
  # Jaeger — trace backend
  # -----------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC receiver (from gateway)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - eb-debug

  # -----------------------------------------------------------------------
  # Prometheus — metrics backend
  # Scrapes both agent and gateway self-metrics.
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - eb-debug

  # -----------------------------------------------------------------------
  # Grafana — dashboard UI
  # Loads both eb-overview and otel-pipeline-health dashboards automatically.
  # -----------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - eb-debug

volumes:
  prometheus-data:
  grafana-data:

networks:
  eb-debug:
    driver: bridge
