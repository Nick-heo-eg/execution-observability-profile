global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otelcol-agent
    static_configs:
      - targets: ["otelcol-agent:8888"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "otelcol_.*"
        action: keep

  - job_name: otelcol-gateway
    static_configs:
      - targets: ["otelcol-gateway:8888"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "otelcol_.*|eb_.*"
        action: keep
